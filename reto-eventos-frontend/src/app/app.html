<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/">
      <img class="brand-logo" src="alienmilk-ufo.svg" alt="Logo AlienMilk Sessions" />
      <span class="brand-text">
        <span class="brand-name">AlienMilk</span>
        <span class="brand-subtitle">Sessions</span>
      </span>
    </a>

    <nav class="nav-links">
      <a routerLink="/" fragment="inicio">Inicio</a>
      <a routerLink="/" fragment="sesiones">Sesiones</a>
      <a routerLink="/" fragment="nosotros">Nosotros</a>
      <a routerLink="/" fragment="contacto">Contacto</a>
    </nav>

    <div class="auth-box" *ngIf="authService.currentUser(); else guestBlock">
      <span class="user-pill">
        {{ authService.currentUser()?.nombre }} · {{ authService.currentUser()?.perfil === 'ROLE_ADMON' ? 'Admin' : 'Cliente' }}
      </span>
      <a class="ghost-btn auth-action" *ngIf="!authService.isAdmin()" routerLink="/reservas">Mi panel</a>
      <a class="ghost-btn auth-action" *ngIf="authService.isAdmin()" routerLink="/admin">Admin</a>
      <button type="button" class="secondary-btn auth-action" (click)="logout()">Salir</button>
    </div>

    <ng-template #guestBlock>
      <div class="guest-actions">
        <a class="ghost-btn" routerLink="/login">Entrar</a>
        <a class="dark-btn" routerLink="/registro">Registrarse</a>
      </div>
    </ng-template>
  </header>

  <main class="page-container">
    <router-outlet />
  </main>

  <footer class="site-footer" aria-hidden="true"></footer>
</div>
