name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and package (skip tests)
        working-directory: reto-eventos-backend
        run: ./mvnw clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: reto-eventos-backend/target/reto-eventos-backend-*.jar
          retention-days: 5

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: reto-eventos-frontend/package-lock.json

      - name: Install dependencies
        working-directory: reto-eventos-frontend
        run: npm ci

      - name: Build for production
        working-directory: reto-eventos-frontend
        run: npx ng build --configuration production

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: reto-eventos-frontend/dist/
          retention-days: 5
